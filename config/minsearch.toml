[base]
dimension = 2
output_dir = "output"

[solver]
name = "function"

[algorithm]
name = "minsearch"
seed = 12345
label_list = ["Te", "ne"]

[algorithm.param]
min_list = [10.0, 0.1]
max_list = [5000.0, 10.0]
initial_list = [200.0, 1.0]
unit_list = [1.0, 1.0]

[algorithm.minimize]
initial_scale_list = [100.0, 1.0]
xatol = 1.0e-4
fatol = 1.0e-4
maxiter = 10000
maxfev = 100000

[runner]
[runner.log]
interval = 20
